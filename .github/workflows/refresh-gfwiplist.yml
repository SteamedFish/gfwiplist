name: Refresh GFW IP List

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

  workflow_dispatch:

  push:
    branches:
      - main
      - master
      - del
    paths:
      - 'misc/generate.py'
      - 'misc/requirements.txt'
      - '.github/workflows/refresh-gfwiplist.yml'

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('misc/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ./misc
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate IP list
        working-directory: ./misc
        run: |
          python generate.py > ../gfwiplist.txt.new
      
      - name: Check for changes
        id: check_changes
        run: |
          if [ -f gfwiplist.txt ]; then
            if diff -q gfwiplist.txt gfwiplist.txt.new > /dev/null 2>&1; then
              echo "No changes detected"
              echo "changed=false" >> $GITHUB_OUTPUT
              rm gfwiplist.txt.new
            else
              echo "Changes detected"
              echo "changed=true" >> $GITHUB_OUTPUT
              mv gfwiplist.txt.new gfwiplist.txt
            fi
          else
            echo "gfwiplist.txt does not exist, creating new file"
            echo "changed=true" >> $GITHUB_OUTPUT
            mv gfwiplist.txt.new gfwiplist.txt
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gfwiplist.txt
          git commit -m "Refresh GFW IP list [skip ci]"
          git push
